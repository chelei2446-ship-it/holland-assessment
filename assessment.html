<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>答题 · 兴趣星图</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.006 240);
      --accent: oklch(56% 0.12 170);
      --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
      --fg-soft: color-mix(in oklch, var(--fg) 6%, transparent);
      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      --container: 940px;
      --gutter: clamp(18px, 4vw, 40px);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.55; }
    button, a { font: inherit; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: var(--font-display); text-wrap: balance; }
    .container { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }
    .topbar { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); background: color-mix(in oklch, var(--bg) 90%, transparent); backdrop-filter: blur(14px); }
    .topbar-inner { min-height: 66px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .logo { font-family: var(--font-display); font-weight: 700; font-size: 22px; }
    .ghost { border: 0; background: transparent; color: var(--muted); cursor: pointer; }
    .progress-wrap { height: 8px; background: var(--fg-soft); border-radius: 999px; overflow: hidden; }
    .progress { height: 100%; width: 0%; background: var(--accent); transition: width .28s ease; }
    main { padding: clamp(34px, 8vw, 82px) 0; }
    .shell { display: grid; grid-template-columns: 180px minmax(0, 1fr); gap: clamp(18px, 5vw, 56px); align-items: start; }
    .side { position: sticky; top: 96px; color: var(--muted); }
    .side strong { display: block; color: var(--fg); font-family: var(--font-display); font-size: 38px; line-height: 1; }
    .question-card { min-height: 520px; padding: clamp(24px, 5vw, 42px); border: 1px solid var(--border); border-radius: 26px; background: var(--surface); box-shadow: 0 24px 80px color-mix(in oklch, var(--fg) 8%, transparent); }
    .eyebrow { color: var(--muted); font: 700 12px/1 var(--font-mono); letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin-top: 18px; font-size: clamp(34px, 5vw, 58px); line-height: 1.08; letter-spacing: -0.025em; }
    .hint { margin-top: 14px; color: var(--muted); }
    .options { display: grid; gap: 12px; margin-top: 30px; }
    .option { width: 100%; min-height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 18px; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); color: var(--fg); text-align: left; cursor: pointer; transition: border-color .16s ease, background .16s ease, transform .16s ease; }
    .option:hover { border-color: color-mix(in oklch, var(--fg) 30%, var(--border)); }
    .option[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-soft); }
    .option:active { transform: translateY(1px); }
    .key { color: var(--muted); font: 12px/1 var(--font-mono); }
    .controls { display: flex; justify-content: space-between; gap: 12px; margin-top: 30px; }
    .btn { min-height: 46px; padding: 12px 18px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--fg); font-weight: 700; cursor: pointer; }
    .btn-primary { border-color: var(--accent); background: var(--accent); color: var(--surface); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .break { display: none; padding: 34px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface); text-align: center; }
    .break h2 { font-size: clamp(30px, 5vw, 48px); }
    .break p { max-width: 46ch; margin: 16px auto 0; color: var(--muted); }
    .modal, .generating { position: fixed; inset: 0; display: none; place-items: center; padding: 20px; background: color-mix(in oklch, var(--fg) 22%, transparent); z-index: 30; }
    .dialog { width: min(520px, 100%); padding: 28px; border: 1px solid var(--border); border-radius: 22px; background: var(--surface); box-shadow: 0 26px 90px color-mix(in oklch, var(--fg) 18%, transparent); }
    .dialog h2 { font-size: 34px; }
    .dialog p { margin-top: 12px; color: var(--muted); }
    .dialog-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
    .dots { display: grid; grid-template-columns: repeat(6, 18px); gap: 12px; margin: 28px 0; justify-content: center; }
    .dots span { width: 18px; height: 18px; border-radius: 50%; background: var(--accent-soft); animation: glow 1.2s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: .12s; }
    .dots span:nth-child(3) { animation-delay: .24s; }
    .dots span:nth-child(4) { animation-delay: .36s; }
    .dots span:nth-child(5) { animation-delay: .48s; }
    .dots span:nth-child(6) { animation-delay: .6s; }
    @keyframes glow { 50% { background: var(--accent); transform: translateY(-4px); } }
    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; display: flex; align-items: baseline; justify-content: space-between; }
      .question-card { min-height: auto; }
      .controls { flex-direction: column-reverse; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topbar" data-od-id="assessment-topbar">
    <div class="container topbar-inner">
      <a class="logo" href="index.html">兴趣星图</a>
      <button class="ghost" id="exitBtn">暂时离开</button>
    </div>
    <div class="container"><div class="progress-wrap" aria-label="答题进度"><div class="progress" id="progress"></div></div></div>
  </header>
  <main>
    <div class="container shell" data-od-id="assessment-flow">
      <aside class="side">
        <span>当前进度</span>
        <strong id="count">01</strong>
        <p id="progressText">准备开始</p>
      </aside>
      <section class="question-card" id="questionCard" aria-live="polite" data-od-id="question-card">
        <p class="eyebrow" id="dimension">兴趣倾向题</p>
        <h1 id="question">题目加载中</h1>
        <p class="hint">请选择更接近你真实兴趣的答案。没有标准答案。</p>
        <div class="options" id="options"></div>
        <div class="controls">
          <button class="btn" id="prevBtn">上一题</button>
          <button class="btn btn-primary" id="nextBtn" disabled>下一题</button>
        </div>
      </section>
      <section class="break" id="breakCard" data-od-id="break-card">
        <p class="eyebrow">中途休息</p>
        <h2>已经完成一半，继续保持轻松判断。</h2>
        <p>如果某些题目让你摇摆，说明你的兴趣结构可能还在展开。继续按现在真实的感觉回答就好。</p>
        <div class="controls" style="justify-content: center;"><button class="btn btn-primary" id="continueBtn">继续答题</button></div>
      </section>
    </div>
  </main>
  <div class="modal" id="exitModal" role="dialog" aria-modal="true" aria-labelledby="exitTitle">
    <div class="dialog">
      <h2 id="exitTitle">当前测评尚未完成</h2>
      <p>你可以继续答题，也可以暂时离开。浏览器会保留当前已选答案，回来后可继续修改。</p>
      <div class="dialog-actions">
        <button class="btn btn-primary" id="stayBtn">继续答题</button>
        <a class="btn" href="landing.html">暂时离开</a>
        <button class="btn" id="resetBtn">重新开始</button>
      </div>
    </div>
  </div>
  <div class="generating" id="generating" aria-live="polite">
    <div class="dialog" style="text-align: center;">
      <p class="eyebrow">正在整理结果</p>
      <h2>正在把你的选择转译成兴趣画像。</h2>
      <div class="dots" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <p>我们会先呈现主导类型，再展开职业方向和下一步行动。</p>
    </div>
  </div>
  <script src="holland-data.js"></script>
  <script>
    const { questions, dimensionInfo, buildResult, safeJsonRead, safeJsonWrite } = window.HollandApp;
    const labels = ["完全不像我", "不太像我", "说不清", "比较像我", "非常像我"];
    if (new URLSearchParams(location.search).get("reset") === "1") {
      localStorage.removeItem("interestAnswers");
      localStorage.removeItem("interestResult");
      history.replaceState(null, "", "assessment.html");
    }
    const savedState = safeJsonRead("interestAnswers") || {};
    let index = Math.min(Number(savedState.index || 0), questions.length - 1);
    let answers = Array.isArray(savedState.answers) ? savedState.answers.slice(0, questions.length) : [];
    let breakSeen = Boolean(savedState.breakSeen);
    let startedAt = savedState.startedAt || Date.now();
    let paused = false;
    const $ = (id) => document.getElementById(id);
    function persist() {
      safeJsonWrite("interestAnswers", { index, answers, breakSeen, startedAt });
    }
    function answeredCount() {
      return answers.filter(Boolean).length;
    }
    function render() {
      paused = false;
      $("questionCard").style.display = "block";
      $("breakCard").style.display = "none";
      const q = questions[index];
      const percent = Math.round((answeredCount() / questions.length) * 100);
      $("count").textContent = `${String(index + 1).padStart(2, "0")} / ${questions.length}`;
      $("progressText").textContent = `已完成 ${percent}%`;
      $("progress").style.width = `${percent}%`;
      $("dimension").textContent = `${q.dim} ${dimensionInfo[q.dim].name} · ${q.type}`;
      $("question").textContent = q.text;
      $("options").innerHTML = labels.map((label, i) => {
        const selected = answers[index] === i + 1;
        return `<button class="option" data-score="${i + 1}" aria-pressed="${selected}"><span>${label}</span><span class="key">${i + 1}</span></button>`;
      }).join("");
      $("prevBtn").disabled = index === 0;
      $("nextBtn").textContent = index === questions.length - 1 ? "提交并生成结果" : "下一题";
      $("nextBtn").disabled = !answers[index];
      persist();
    }
    function showBreak() {
      paused = true;
      $("questionCard").style.display = "none";
      $("breakCard").style.display = "block";
      $("progress").style.width = `${(answeredCount() / questions.length) * 100}%`;
    }
    function finish() {
      const result = buildResult(answers);
      result.durationSeconds = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
      safeJsonWrite("interestResult", result);
      $("generating").style.display = "grid";
      setTimeout(() => { window.location.href = "result.html"; }, 1500);
    }
    $("options").addEventListener("click", (event) => {
      const btn = event.target.closest(".option");
      if (!btn) return;
      answers[index] = Number(btn.dataset.score);
      render();
    });
    $("nextBtn").addEventListener("click", () => {
      if (!answers[index]) return;
      if (index === questions.length - 1) { finish(); return; }
      index += 1;
      if (index === Math.floor(questions.length / 2) && !breakSeen) {
        breakSeen = true;
        persist();
        showBreak();
      } else {
        render();
      }
    });
    $("prevBtn").addEventListener("click", () => { if (index > 0) { index -= 1; render(); } });
    $("continueBtn").addEventListener("click", render);
    $("exitBtn").addEventListener("click", () => { $("exitModal").style.display = "grid"; });
    $("stayBtn").addEventListener("click", () => { $("exitModal").style.display = "none"; });
    $("resetBtn").addEventListener("click", () => {
      answers = [];
      index = 0;
      breakSeen = false;
      startedAt = Date.now();
      localStorage.removeItem("interestResult");
      persist();
      $("exitModal").style.display = "none";
      render();
    });
    window.addEventListener("keydown", (event) => {
      if (paused || $("generating").style.display === "grid") return;
      const n = Number(event.key);
      if (n >= 1 && n <= 5) { answers[index] = n; render(); }
      if (event.key === "ArrowRight" && answers[index]) $("nextBtn").click();
      if (event.key === "ArrowLeft" && index > 0) $("prevBtn").click();
    });
    window.addEventListener("beforeunload", (event) => {
      if (answeredCount() > 0 && answeredCount() < questions.length) {
        event.preventDefault();
        event.returnValue = "";
      }
    });
    render();
  </script>
</body>
</html>
