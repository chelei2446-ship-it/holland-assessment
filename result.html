<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>结果总览 · 兴趣星图</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.006 240);
      --accent: oklch(56% 0.12 170);
      --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
      --fg-soft: color-mix(in oklch, var(--fg) 6%, transparent);
      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      --container: 1180px;
      --gutter: clamp(18px, 4vw, 40px);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.55; }
    a, button { color: inherit; font: inherit; }
    a { text-decoration: none; }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: var(--font-display); text-wrap: balance; }
    .container { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }
    .topnav { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); background: color-mix(in oklch, var(--bg) 92%, transparent); backdrop-filter: blur(14px); }
    .topnav-inner { min-height: 68px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
    .btn { min-height: 44px; display: inline-flex; align-items: center; justify-content: center; padding: 11px 18px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); font-weight: 700; cursor: pointer; }
    .btn-primary { border-color: var(--accent); background: var(--accent); color: var(--surface); }
    .hero { padding: clamp(42px, 8vw, 90px) 0; }
    .grid { display: grid; grid-template-columns: minmax(0, .95fr) minmax(320px, 1.05fr); gap: clamp(28px, 6vw, 72px); align-items: start; }
    .eyebrow { margin-bottom: 16px; color: var(--muted); font: 700 12px/1 var(--font-mono); letter-spacing: .08em; text-transform: uppercase; }
    h1 { font-size: clamp(42px, 7vw, 78px); line-height: 1; letter-spacing: -0.03em; }
    .lead { margin-top: 20px; color: var(--muted); font-size: 18px; max-width: 58ch; }
    .summary { padding: clamp(24px, 4vw, 36px); border: 1px solid var(--border); border-radius: 24px; background: var(--surface); box-shadow: 0 26px 80px color-mix(in oklch, var(--fg) 8%, transparent); }
    .code { font: 800 clamp(72px, 12vw, 132px)/.88 var(--font-display); letter-spacing: -0.06em; color: var(--fg); }
    .bars { display: grid; gap: 14px; margin-top: 28px; }
    .bar-row { display: grid; grid-template-columns: 72px 1fr 42px; gap: 12px; align-items: center; }
    .bar-row span { font: 13px/1 var(--font-mono); color: var(--muted); }
    .bar { height: 11px; border-radius: 999px; background: var(--fg-soft); overflow: hidden; }
    .bar i { display: block; height: 100%; width: var(--w); border-radius: inherit; background: var(--accent); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
    .section { padding: clamp(46px, 8vw, 88px) 0; border-top: 1px solid var(--border); }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 30px; }
    .card { padding: 24px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); }
    .card h3 { font-size: 24px; }
    .card p { margin-top: 10px; color: var(--muted); }
    .dims { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
    .dim-btn { min-height: 42px; padding: 9px 13px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); cursor: pointer; }
    .dim-btn[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-soft); }
    .explain { margin-top: 16px; padding: 20px; border-top: 1px solid var(--fg); background: color-mix(in oklch, var(--surface) 72%, transparent); color: var(--muted); }
    @media (max-width: 920px) { .grid, .cards { grid-template-columns: 1fr; } .topnav .btn { display: none; } }
    @media (max-width: 430px) { .actions .btn { width: 100%; } .bar-row { grid-template-columns: 50px 1fr 34px; } }
  </style>
</head>
<body>
  <header class="topnav" data-od-id="topnav">
    <div class="container topnav-inner">
      <a class="logo" href="index.html">兴趣星图</a>
      <a class="btn" href="assessment.html?reset=1">重新测评</a>
    </div>
  </header>
  <main>
    <section class="hero" data-od-id="result-overview">
      <div class="container grid">
        <div>
          <p class="eyebrow">结果总览</p>
          <h1 id="headline">你的兴趣结构正在生成</h1>
          <p class="lead" id="summaryText">结果会先展示主导兴趣类型，再展开推荐方向、报告和行动清单。</p>
          <div class="actions">
            <a class="btn btn-primary" href="report.html">查看详细报告</a>
            <a class="btn" href="careers.html">探索职业方向</a>
            <a class="btn" href="share.html">生成分享摘要</a>
          </div>
        </div>
        <aside class="summary" aria-label="六维分布">
          <p class="eyebrow">主导组合</p>
          <div class="code" id="code">AS</div>
          <p class="lead" style="font-size: 16px;" id="codeText">艺术型与社会型倾向更突出。</p>
          <div class="bars" id="bars"></div>
        </aside>
      </div>
    </section>
    <section class="section" data-od-id="dimension-detail">
      <div class="container">
        <p class="eyebrow">六型解释</p>
        <h2 style="font-size: clamp(32px, 4vw, 52px);">点击维度，查看它在职业探索中的含义。</h2>
        <div class="dims" id="dimButtons"></div>
        <div class="explain" id="dimExplain"></div>
      </div>
    </section>
    <section class="section" data-od-id="recommended-next">
      <div class="container">
        <p class="eyebrow">下一步</p>
        <h2 style="font-size: clamp(32px, 4vw, 52px);">把结果变成可尝试的行动。</h2>
        <div class="cards">
          <article class="card"><h3>读完整报告</h3><p>了解主导类型、辅助类型、适合环境和需要谨慎选择的工作环境。</p></article>
          <article class="card"><h3>比较职业方向</h3><p>从教育服务、创意设计、用户研究、内容策划等方向里查看匹配原因。</p></article>
          <article class="card"><h3>保存摘要</h3><p>生成只包含主导类型和核心解读的分享卡，默认保护隐私。</p></article>
        </div>
      </div>
    </section>
  </main>
  <script src="holland-data.js"></script>
  <script>
    const {
      dimensionInfo,
      dimensions,
      readResult,
      orderedDimensions,
      comboHeadline,
      comboSummary
    } = window.HollandApp;

    const result = readResult();
    const ordered = orderedDimensions(result.scores);
    const topDims = result.top.slice(0, 2);
    const max = Math.max(1, ...Object.values(result.scores));
    const dimName = (dim) => dimensionInfo[dim].name;

    document.getElementById("code").textContent = topDims.join("");
    document.getElementById("headline").textContent = result.hasSavedResult ? comboHeadline(topDims) : "这是一份可预览的示例结果";
    document.getElementById("summaryText").textContent = result.hasSavedResult
      ? `${comboSummary(topDims)} 下面的报告会把分数转译成职业线索。`
      : "完成测评后，这里会替换为你的真实主导组合、六维分布和职业建议。";
    document.getElementById("codeText").textContent = `${dimName(topDims[0])}与${dimName(topDims[1])}倾向更突出，但它们不是固定标签。`;
    document.getElementById("bars").innerHTML = ordered.map(([dim, score]) => {
      const width = Math.round((score / max) * 100);
      return `
        <div class="bar-row">
          <span>${dim} ${dimName(dim)}</span>
          <div class="bar" role="img" aria-label="${dimName(dim)}相对强度 ${width}%"><i style="--w:${width}%;"></i></div>
          <span>${score}</span>
        </div>
      `;
    }).join("");
    const buttons = document.getElementById("dimButtons");
    const explain = document.getElementById("dimExplain");
    function setDim(dim) {
      [...buttons.children].forEach((btn) => btn.setAttribute("aria-pressed", btn.dataset.dim === dim));
      explain.textContent = `${dim} ${dimName(dim)}：${dimensionInfo[dim].insight} ${dimensionInfo[dim].strength}`;
    }
    buttons.innerHTML = dimensions.map((dim) => `<button class="dim-btn" data-dim="${dim}" aria-pressed="false">${dim} ${dimName(dim)}</button>`).join("");
    buttons.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (btn) setDim(btn.dataset.dim);
    });
    setDim(topDims[0]);
  </script>
</body>
</html>
